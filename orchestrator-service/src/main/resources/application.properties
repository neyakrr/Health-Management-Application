server.port=8080
spring.datasource.url=jdbc:sqlite:./data/health_concierge.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
gemini.api.key=${GEMINI_API_KEY}
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
mcp.calendar.url=http://mcp-calendar:8081
mcp.pharmacy.url=http://mcp-pharmacy:8082
mcp.notify.url=http://mcp-notify:8083
mcp.records.url=http://mcp-records:8084
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:no-reply@healthconcierge.app}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
